# Application Name

spring.application.name=Banking Management System

# Server Configuration

server.port=8080

# Database Configuration (MySQL)

spring.datasource.url=jdbc:mysql://localhost:3306/banking_system?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
Spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Logging Configuration

logging.level.org.springframework.security=DEBUG
logging.level.com.bankingsystem=DEBUG

# JWT Configuration (we?ll use this later for authentication)

jwt.secret=MySecretKeyForBankingSystemJWT2024ThisIsAVeryLongSecretKey
jwt.expiration=86400000

# File Upload Configuration (for future use - profile pictures, documents)

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB 
